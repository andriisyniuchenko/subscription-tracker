<!DOCTYPE html>
<html>
<head>
    <title>Subscriptions</title>
</head>
<body>
    <h1>Subscriptions</h1>
    <a href="/subscriptions/create/">Add Subscription</a>
    <ul>
        {% for sub in subscriptions %}
            <li>
                {{ sub.name }} - ${{ sub.price }} ({{ sub.billing_cycle }})
            </li>
        {% empty %}
            <li>No subscriptions yet</li>
        {% endfor %}
    </ul>
</body>
</html>
