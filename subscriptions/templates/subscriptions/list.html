<!DOCTYPE html>
<html>
<head>
    <title>Subscriptions</title>
</head>
<body>
    <h2>Dashboard</h2>

    <p>Total monthly cost: ${{ total_monthly }}</p>
    <p>Active subscriptions: {{ active_count }}</p>

    <hr>
    <h1>Subscriptions</h1>
    <a href="/subscriptions/create/">Add Subscription</a>
    <ul>
        {% for sub in subscriptions %}
            <li>
                {{ sub.name }} - ${{ sub.price }} ({{ sub.billing_cycle }})
                <a href="/subscriptions/update/{{ sub.id }}/">Edit</a>
                <a href="/subscriptions/delete/{{ sub.id }}/">Delete</a>
            </li>
        {% empty %}
            <li>No subscriptions yet</li>
        {% endfor %}
    </ul>
</body>
</html>
