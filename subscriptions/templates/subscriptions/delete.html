{% extends "base.html" %}

{% block title %}Delete Subscription{% endblock %}

{% block content %}
<h1>Delete Subscription</h1>

<div class="card">
    <p style="margin-bottom: 1.5rem; color: #374151;">
        Are you sure you want to delete <strong>{{ subscription.name }}</strong>? This action cannot be undone.
    </p>

    <form method="post">
        {% csrf_token %}
        <div class="form-actions">
            <button class="btn btn-danger" type="submit">Yes, delete</button>
            <a class="btn btn-secondary" href="{% url 'subscription_list' %}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
